    <body>
        <h1>Enviar mensaje :D</h1>
        <div class="container">
            <form action="https://formspree.io/f/xwkwreqd" method="post">
                <label for="email" class="form-label">Correo Electr&oacute;nico</label>
                <input type="email" class="form-control" id="email" style="background: black; color: white;" required>
                <br>
                <label for="mensaje" class="form-label">Mensaje</label>
                <textarea type="email" class="form-control" id="mensaje" style="background: black; color: white;" required></textarea>
                <br>
                <button class="btn btn-primary" type="submit">Enviar</button>
            </form>
        </div>
